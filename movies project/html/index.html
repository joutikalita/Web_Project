<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub Library</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
    <h1>MovieHub</h1>
    <nav>
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('library')">My Library</a>
    </nav>
</header>

<div class="container" id="homeSection">
    <h2>Add Movies</h2>
    <input type="text" id="title" placeholder="Movie Title">
    <input type="text" id="image" placeholder="Image URL">
    <button onclick="addMovie()">Add Movie</button>

    <div class="grid" id="homeGrid"></div>
</div>

<div class="container" id="librarySection" style="display:none;">
    <h2>My Library</h2>
    <div class="grid" id="libraryGrid"></div>
</div>

<script src="../js/script.js"></script>
</body>
</html>
